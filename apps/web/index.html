<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Papaleta</title>
    <meta name="description" content="Papaleta — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Papaleta" />
    <meta property="og:description" content="Papaleta — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Papaleta" />
    <meta name="twitter:description" content="Papaleta — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/png" href="/papaletaLogok.png" />
    <link rel="apple-touch-icon" href="/papaletaLogok.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* FIX LOGIN - INLINE STYLES CON MÁXIMA PRIORIDAD */
      #papaleta-root #login {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 24px !important;
        background: #000000 !important;
        z-index: 99999 !important;
        overflow-y: auto !important;
      }
      #papaleta-root #login .login-layout {
        position: relative !important;
        z-index: 100000 !important;
        display: block !important;
        width: 100% !important;
        max-width: 500px !important;
        margin: 0 auto !important;
      }
      #papaleta-root #login .login-panel-brand {
        width: 100% !important;
        padding: 0 0 28px 0 !important;
        text-align: center !important;
      }
      #papaleta-root #login .lc-logo-img {
        width: 80px !important;
        height: 80px !important;
        display: block !important;
        margin: 0 auto 20px auto !important;
        border-radius: 20px !important;
      }
      #papaleta-root #login .lc-title {
        font-size: 42px !important;
        font-weight: 700 !important;
        text-align: center !important;
        color: #f5f5f7 !important;
        margin-bottom: 8px !important;
      }
      #papaleta-root #login .lc-sub {
        color: rgba(245, 245, 247, 0.7) !important;
        font-size: 16px !important;
        text-align: center !important;
        margin-bottom: 24px !important;
      }
      #papaleta-root #login .lc-features {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
        margin-bottom: 8px !important;
      }
      #papaleta-root #login .lcf {
        font-size: 13px !important;
        color: rgba(245, 245, 247, 0.85) !important;
        padding: 12px 14px !important;
        background: rgba(255, 255, 255, 0.06) !important;
        border-radius: 10px !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        text-align: center !important;
      }
      #papaleta-root #login .login-card {
        width: 100% !important;
        margin: 0 !important;
        border-radius: 24px !important;
        padding: 40px 36px !important;
        background: rgba(255, 255, 255, 0.05) !important;
        backdrop-filter: blur(40px) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4) !important;
      }
      #papaleta-root #login .lc-auth-title {
        font-size: 22px !important;
        font-weight: 700 !important;
        text-align: center !important;
        color: #f5f5f7 !important;
        margin-bottom: 10px !important;
      }
      @media (max-width: 600px) {
        #papaleta-root #login .lc-features {
          grid-template-columns: 1fr !important;
        }
        #papaleta-root #login .lc-title {
          font-size: 34px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
