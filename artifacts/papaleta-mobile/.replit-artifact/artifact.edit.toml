kind = "mobile"
  previewPath = "/papaleta-mobile"
  title = "Papaleta Mobile"
  version = "1.0.0"
  id = "artifacts/papaleta-mobile"
  router = "path"

  [[integratedSkills]]
  name = "expo"
  version = "1.0.0"

  [[services]]
  name = "expo"
  paths = [ "/papaleta-mobile" ]
  localPort = 19006

  [services.development]
  run = "pnpm --filter @workspace/papaleta-mobile run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/papaleta-mobile", "run", "build" ]
  run = "pnpm --filter @workspace/papaleta-mobile run serve"

  [services.env]
  PORT = "19006"
  